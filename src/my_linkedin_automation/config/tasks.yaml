research_job_task:
  description: >
    Find 1 active Software Engineer job openings in Pune. 
    STRICT RULES:
    1. Only provide direct job posting links from 'in.indeed.com' or 'naukri.com'.
    2. DISCARD any LinkedIn links found, as they are blocked for the user.
    3. Ensure the URLs are direct view pages (e.g., links containing '/viewjob' for Indeed 
      or '/job-listings-' for Naukri).
    4. DO NOT use ellipses (...) or shorten the URLs. You must provide the FULL, 
      untruncated URL string.
    5. If the search tool provides a shortened URL, keep searching until you find 
      the direct, clickable job link.
  expected_output: >
    A list of exactly 1 jobs from Indeed or Naukri. For each job, provide:
    - JOB_TITLE: [Title]
    - FULL_URL: [The complete, long URL from Indeed or Naukri]
    - COMPANY: [Company Name]
    - KEY_SKILLS: [extracted from snippet]
  agent: job_researcher

analyze_resume_task:
  description: >
    1. Use the 'read_resume' tool to read the user's resume at {resume_path}.
    2. Review the job details and requirements provided in the context from the research_job_task.
    3. Perform a deep comparison between the resume and the 2 job descriptions.
    4. Generate a detailed ATS Compatibility Report for each job.
  expected_output: >
    A markdown report for each job including: 
    - Job Title and URL
    - Overall Compatibility Score (0-100%)
    - List of Matching Skills
    - Missing Skills or Gap Analysis
  agent: resume_analyst
  context:
    - research_job_task

outreach_task:
  description: >
    Review the Indeed/Naukri jobs found. 
    1. Check the URLs: If they are identical, delete the duplicates.
    2. Check the Titles: If a job is for 'VP', 'Manager', or 'Marketing', discard it.
    3. Keep only roles matching 'Software Engineer' or 'Frontend'.
  expected_output: "A clean, deduplicated list of 2 relevant Software Engineering jobs."
  agent: outreach_specialist

user_checkup_task:
  description: >
    1. Review the output from the analyze_resume_task. 
    2. If jobs were found, send the 'Checkup Email' to {user_email}.
    3. If NO jobs were found, send an email to {user_email} saying 'No matching 
      roles found today' and stop.
    4. Wait for 'yes' only if jobs were actually found.
  expected_output: "Email sent to user regarding job status."
  agent: automation_manager

simulate_application_task:
  description: >
    Review the single job role approved during the user checkup step. 
    
    Call the 'execute_job_application' tool EXACTLY ONCE for this job. 
    Extract and pass the following arguments to the tool:
    - job_title: The name of the engineering role
    - company: The hiring organization's name
    - job_url: The direct link string
    - location: The geographic city location of the role
    - ats_score: The calculated score percentage from the resume analyst stage
  expected_output: "A success message confirming the single job was written to the CSV file."
  agent: automation_manager
  context:
    - user_checkup_task
    - research_job_task
    - analyze_resume_task

write_cover_letter_task:
  description: >
    Write a highly customized cover letter for the single job approved in the user_checkup_task.
    
    INSTRUCTIONS:
    1. Read the exact job requirements from the research_job_task.
    2. Read the candidate's skills and gaps from the analyze_resume_task.
    3. Draft a professional, 3-paragraph cover letter addressing the hiring manager. 
      Highlight the candidate's MCA background and frontend internship experience.
    4. You MUST use the 'save_cover_letter' tool to save the document. 
      Pass the company_name, job_title, and the full letter_content to the tool.
  expected_output: "A success message confirming the cover letter was saved as a markdown file."
  agent: cover_letter_writer
  context:
    - user_checkup_task
    - research_job_task
    - analyze_resume_task


tailor_resume_task:
  description: >
    Create a highly customized, full-length Markdown resume based on the job requirements found in the research_job_task.
    
    BASE RESUME TO EDIT:
    # Chelsi Jain
    Frontend Web Developer & MCA Student<br>
    Pune, India | your.email@sppu.edu | github.com/yourusername | linkedin.com/in/yourusername

    ## Education
    * **Master of Computer Applications (MCA)** - Savitribai Phule Pune University (SPPU)
    * Vice Chairperson, ACM Student Chapter

    ## Experience
    **Cybersecurity Intern** | ASD Cybersecurity
    * Conducted vulnerability assessments and penetration testing on 15+ web applications.
    * Monitored network traffic for suspicious activities and drafted daily security reports, reducing incident response time by 20%.

    ## Projects
    **Scan-to-Shelf Kitchen Manager**
    * Developed a web application using React.js for 50+ test users.
    * Integrated Vision AI to scan grocery receipts with 95% accuracy.

    **LinkedIn Automation Agent**
    * Built an automation script using Python, saving 10 hours of manual work per week.
    * Used CrewAI to organize data into modular pipelines.

    ## Skills
    * **Languages:** Python, C++, JavaScript, TypeScript
    * **Frameworks:** React.js, Tailwind CSS, Node.js
    * **Tools:** Git, n8n, CrewAI, Linux
    
    INSTRUCTIONS:
    1. Act as a precision editor. Keep 80% of the resume exactly the same. ONLY modify the bullet points under 'Projects'.
    
    STRICT PRESERVATION RULES:
    - DO NOT summarize or shorten the document.
    - PRESERVE EXACTLY: Header block (Name, Email, Links), Education block, and the Skills block at the bottom. Do not delete the Skills section!
    - PRESERVE EXACTLY: The company name 'ASD Cybersecurity' and its exact bullet points.
    
    ATS OPTIMIZATION RULES:
    - Focus your alterations purely on the bullet points beneath the 'Scan-to-Shelf' and 'LinkedIn Automation Agent' projects.
    - Rewrite those bullet points to naturally inject the technical keywords requested by the employer (from the research_job_task).
    - ANTI-FLUFF MANDATE: Do NOT use filler phrases. Write punchy, highly technical sentences.
    - Keep all hard metrics (numbers, percentages, hours) completely intact.
    - Use the 'save_tailored_resume' tool to save the file. Pass the target company_name and the full markdown text.
  expected_output: "A success message confirming the tailored resume was saved."
  agent: resume_tailor
  context:
    - research_job_task